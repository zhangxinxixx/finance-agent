# Alembic configuration for finance-agent analysis tables
# Usage: cd /path/to/finance-agent && alembic -c database/migrations/alembic.ini revision --autogenerate -m "add analysis tables"

[alembic]
script_location = database/migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url = postgresql://finance_agent:***@localhost:5432/finance_agent

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
